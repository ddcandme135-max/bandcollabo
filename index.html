<!DOCTYPE html>
<html>

<head>

<title>BandCollab</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#7c3aed;
color:white;
cursor:pointer;
}

button:hover{
background:#6d28d9;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

.project{
background:#1a1a1a;
padding:20px;
margin-top:15px;
border-radius:10px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h1>BandCollab</h1>

<p>Create music together</p>

<button onclick="login()">Google Login</button>

<p id="userName"></p>

<hr>

<button onclick="showForm()">Upload Project</button>

<div id="projectForm" style="display:none">

<input id="title" placeholder="Project title">

<textarea id="description" placeholder="Project description"></textarea>

<button onclick="addProject()">Post Project</button>

</div>

<h2>Projects</h2>

<div id="projects"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js"

import { 
getAuth,
signInWithRedirect,
getRedirectResult,
GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js"

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js"



const firebaseConfig = {

apiKey: "여기에 API KEY",

authDomain: "bandcollabo-7b0e2.firebaseapp.com",

projectId: "bandcollabo-7b0e2",

storageBucket: "bandcollabo-7b0e2.appspot.com",

messagingSenderId: "286958233959",

appId: "1:286958233959:web:af4a057a5cff4ac5d6e7c2"

}



const app = initializeApp(firebaseConfig)

const auth = getAuth(app)

const provider = new GoogleAuthProvider()

const db = getFirestore(app)



window.login = function(){

signInWithRedirect(auth, provider)

}



getRedirectResult(auth).then((result)=>{

if(result){

const user=result.user

document.getElementById("userName").innerText="Logged in: "+user.displayName

}

})



window.showForm=function(){

document.getElementById("projectForm").style.display="block"

}



window.addProject=async function(){

let title=document.getElementById("title").value

let description=document.getElementById("description").value

if(title==="")return

await addDoc(collection(db,"projects"),{

title:title,

description:description

})

loadProjects()

}



async function loadProjects(){

const querySnapshot=await getDocs(collection(db,"projects"))

document.getElementById("projects").innerHTML=""

querySnapshot.forEach((doc)=>{

let data=doc.data()

let html=`

<div class="project">

<h3>${data.title}</h3>

<p>${data.description}</p>

<button>Apply</button>

</div>

`

document.getElementById("projects").innerHTML+=html

})

}



loadProjects()

</script>

</body>

</html>
