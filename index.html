<!DOCTYPE html>
<html>
<head>

<title>BandCollab</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
padding:80px;
}

button{
padding:16px 26px;
font-size:18px;
background:#7c3aed;
border:none;
border-radius:10px;
color:white;
}

</style>

</head>

<body>

<h1>BandCollab</h1>

<button id="loginBtn">Google Login</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "여기에 API KEY",

authDomain: "bandcollabo-7b0e2.firebaseapp.com",

projectId: "bandcollabo-7b0e2",

storageBucket: "bandcollabo-7b0e2.appspot.com",

messagingSenderId: "286958233959",

appId: "1:286958233959:web:af4a057a5cff4ac5d6e7c2"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").addEventListener("click", () => {

signInWithRedirect(auth, provider);

});

</script>

</body>
</html>
